allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

// Fix for "Namespace not specified" error in older Flutter plugins
// This version is more robust and avoids the "already evaluated" error
subprojects {
    project.plugins.configureEach { plugin ->
        if (plugin.class.name.contains("com.android.build.gradle.AppPlugin") || 
            plugin.class.name.contains("com.android.build.gradle.LibraryPlugin")) {
            project.android {
                if (namespace == null) {
                    namespace = "com.wwc.plugin.${project.name.replace("-", ".")}"
                }
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
